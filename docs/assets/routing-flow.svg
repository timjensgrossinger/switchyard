<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200" role="img" aria-label="Cost-aware tier routing">
  <rect width="800" height="200" fill="#0d1117" rx="8"/>
  <text x="400" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#f0f6fc">Cost-aware tier routing</text>
  <g font-family="system-ui,sans-serif">
    <rect x="40" y="60" width="140" height="50" rx="6" fill="#21262d" stroke="#30363d"/>
    <text x="110" y="92" text-anchor="middle" font-size="13" fill="#c9d1d9">Your task</text>
    <text x="210" y="92" font-size="20" fill="#58a6ff">’</text>
    <rect x="230" y="60" width="140" height="50" rx="6" fill="#21262d" stroke="#58a6ff"/>
    <text x="300" y="88" text-anchor="middle" font-size="12" fill="#58a6ff">Score tier</text>
    <text x="300" y="104" text-anchor="middle" font-size="11" fill="#8b949e">low / med / high</text>
    <text x="400" y="92" font-size="20" fill="#58a6ff">’</text>
