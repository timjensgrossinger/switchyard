    <rect x="630" y="60" width="130" height="50" rx="6" fill="#1a2e1a" stroke="#3fb950"/>
    <text x="695" y="92" text-anchor="middle" font-size="13" fill="#3fb950">Execute</text>
  </g>
  <text x="400" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#6e7681">Boilerplate ’ free models · Hard reasoning ’ premium models</text>
</svg>
