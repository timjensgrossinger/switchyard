  <!-- Wave 1 -->
  <text x="60" y="58" font-family="system-ui,sans-serif" font-size="12" fill="#8b949e">Wave 1</text>
  <rect x="120" y="44" width="100" height="36" rx="4" fill="#21262d" stroke="#3fb950"/>
  <rect x="240" y="44" width="100" height="36" rx="4" fill="#21262d" stroke="#3fb950"/>
  <rect x="360" y="44" width="100" height="36" rx="4" fill="#21262d" stroke="#3fb950"/>
  <text x="170" y="67" text-anchor="middle" font-size="11" fill="#c9d1d9">config.py</text>
  <text x="290" y="67" text-anchor="middle" font-size="11" fill="#c9d1d9">models.py</text>
  <text x="410" y="67" text-anchor="middle" font-size="11" fill="#c9d1d9">utils.py</text>
